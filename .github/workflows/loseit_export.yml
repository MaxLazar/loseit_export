name: Lose It! Daily Nutrition Export

on:
  schedule:
    # 12:00 EST (17:00 UTC)
    - cron: '0 17 * * *'
    # 17:00 EST (22:00 UTC)
    - cron: '0 22 * * *'
    # 20:00 EST (02:00 UTC next day)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to include (leave blank to use DAYS_RANGE variable)'
        required: false
        type: string
      from_date:
        description: 'Start date YYYY-MM-DD (overrides days)'
        required: false
        type: string
      to_date:
        description: 'End date YYYY-MM-DD (overrides days)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Build CLI arguments
        id: args
        run: |
          ARGS="--github-summary"
          if [ -n "${{ inputs.from_date }}" ] && [ -n "${{ inputs.to_date }}" ]; then
            ARGS="$ARGS --from-date ${{ inputs.from_date }} --to-date ${{ inputs.to_date }}"
          elif [ -n "${{ inputs.days }}" ]; then
            ARGS="$ARGS --days ${{ inputs.days }}"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Export nutrition data
        env:
          LOSEIT_EMAIL: ${{ secrets.LOSEIT_EMAIL }}
          LOSEIT_PASSWORD: ${{ secrets.LOSEIT_PASSWORD }}
          DAYS_RANGE: ${{ vars.DAYS_RANGE || '1' }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: python export_loseit.py ${{ steps.args.outputs.args }}

      - name: Upload login failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-failure-screenshot
          path: /tmp/loseit_login_failure.png
          if-no-files-found: ignore
